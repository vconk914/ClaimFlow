kind = "data-app"
previewPath = "/"
title = "Medical Billing Dashboard"
version = "1.0.0"
id = "artifacts/billing-dashboard"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21912

[services.development]
run = "pnpm --filter @workspace/billing-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/billing-dashboard", "run", "build" ]
publicDir = "artifacts/billing-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21912"
BASE_PATH = "/"
